version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: procurai-postgres
    environment:
      POSTGRES_DB: procurai
      POSTGRES_USER: procurai
      POSTGRES_PASSWORD: procurai-dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U procurai"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: procurai-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Supabase (optional - for local testing)
  # supabase:
  #   image: supabase/supabase:latest
  #   ports:
  #     - "3000:3000"
  #     - "8000:8000"
  #   environment:
  #     POSTGRES_PASSWORD: postgres

volumes:
  postgres_data:

# Usage:
# docker-compose up -d
# docker-compose down
